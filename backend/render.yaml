services:
  - type: web
    name: warehouse-api
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: warehouse_db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: SEED_MANAGER_EMAIL
        value: manager@warehouse.com
      - key: SEED_MANAGER_PASSWORD
        sync: false
      - key: SEED_ASST_EMAIL
        value: asst@warehouse.com
      - key: SEED_ASST_PASSWORD
        sync: false
      - key: SEED_DC_EMAIL
        value: dc@warehouse.com
      - key: SEED_DC_PASSWORD
        sync: false
